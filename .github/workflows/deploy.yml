name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install Wrangler
        run: npm install -g wrangler
      
      - name: Create KV Namespace if not exists
        run: |
          # 检查KV命名空间是否存在，如果不存在则创建
          KV_NAMESPACE_ID=$(wrangler kv:namespace list | grep API_KEYS | awk '{print $1}' || echo "")
          if [ -z "$KV_NAMESPACE_ID" ]; then
            echo "Creating KV namespace API_KEYS..."
            KV_NAMESPACE_ID=$(wrangler kv:namespace create API_KEYS | grep -oP 'id = "\K[^"]+')
            echo "Created KV namespace with ID: $KV_NAMESPACE_ID"
            
            # 更新wrangler.toml文件
            sed -i "s/API_KEYS_ID/$KV_NAMESPACE_ID/g" wrangler.toml
            
            # 创建预览环境的KV命名空间
            PREVIEW_ID=$(wrangler kv:namespace create API_KEYS --preview | grep -oP 'id = "\K[^"]+')
            sed -i "s/API_KEYS_PREVIEW_ID/$PREVIEW_ID/g" wrangler.toml
          else
            echo "KV namespace API_KEYS already exists with ID: $KV_NAMESPACE_ID"
            # 更新wrangler.toml文件
            sed -i "s/API_KEYS_ID/$KV_NAMESPACE_ID/g" wrangler.toml
            
            # 获取预览环境的KV命名空间ID
            PREVIEW_ID=$(wrangler kv:namespace list --preview | grep API_KEYS | awk '{print $1}' || echo "")
            if [ -z "$PREVIEW_ID" ]; then
              PREVIEW_ID=$(wrangler kv:namespace create API_KEYS --preview | grep -oP 'id = "\K[^"]+')
            fi
            sed -i "s/API_KEYS_PREVIEW_ID/$PREVIEW_ID/g" wrangler.toml
          fi
      
      - name: Deploy to Cloudflare Workers
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
