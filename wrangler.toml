name = "openrouter-apikey-manager"
main = "index.js"
compatibility_date = "2023-10-30"

# KV命名空间配置
# 注意：在部署时，如果没有指定ID，将会自动创建一个新的KV命名空间
kv_namespaces = [
  { binding = "API_KEYS", id = "temporary-id-for-deployment" }
]

# 允许使用未绑定的KV命名空间
# 这将允许在部署时使用临时ID
[vars]
ALLOW_UNBOUND_BINDINGS = true

# 路由配置（如果你有自定义域名）
# routes = [
#   { pattern = "your-domain.com/*", zone_name = "your-domain.com" }
# ]

# 触发器配置
[triggers]
crons = []
