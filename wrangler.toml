name = "openrouter-apikey-manager"
main = "index.js"
compatibility_date = "2023-10-30"

# KV命名空间配置
# 在部署时会自动创建或使用现有的KV命名空间
[[kv_namespaces]]
binding = "API_KEYS"
# 如果你已经有一个KV命名空间，可以取消下面的注释并添加你的ID
# id = "your-kv-namespace-id"

# 路由配置（如果你有自定义域名）
# routes = [
#   { pattern = "your-domain.com/*", zone_name = "your-domain.com" }
# ]

# 触发器配置
[triggers]
crons = []
